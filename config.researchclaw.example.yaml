project:
  name: "my-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

# ============================================================================
# LLM Provider Configuration
# ============================================================================
# Supported providers:
#   - "openai"           → OpenAI API (default base_url)
#   - "openrouter"       → OpenRouter (access to 200+ models via single API)
#   - "deepseek"         → DeepSeek API
#   - "openai-compatible" → Any OpenAI-compatible API (requires base_url)
#   - "acp"              → ACP agent protocol (for local agents)
#
# OpenRouter Example (https://openrouter.ai):
#   Get your API key at https://openrouter.ai/keys
#   Models: anthropic/claude-3.5-sonnet, google/gemini-pro-1.5, meta-llama/llama-3.1-70b-instruct
#   See all models: https://openrouter.ai/models
# ============================================================================
llm:
  # Provider options: "openai", "openrouter", "deepseek", "openai-compatible", "acp"
  provider: "openai"
  
  # base_url is auto-set for known providers (openai, openrouter, deepseek)
  # Only needed for "openai-compatible" provider
  base_url: "https://api.openai.com/v1"
  
  # API key from environment variable (recommended) or direct value
  api_key_env: "OPENAI_API_KEY"
  api_key: ""
  
  primary_model: "gpt-4o"
  fallback_models:
    - "gpt-4.1"
    - "gpt-4o-mini"
  
  # Semantic Scholar API key (optional, for literature search)
  s2_api_key: ""
  notes: ""

# ============================================================================
# Example: OpenRouter Configuration
# ============================================================================
# llm:
#   provider: "openrouter"
#   api_key_env: "OPENROUTER_API_KEY"
#   primary_model: "anthropic/claude-3.5-sonnet"
#   fallback_models:
#     - "google/gemini-pro-1.5"
#     - "meta-llama/llama-3.1-70b-instruct"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096
  docker:
    image: "researchclaw/experiment:latest"
    gpu_enabled: true
    memory_limit_mb: 8192
    network_policy: "none"
    auto_install_deps: true
    shm_size_mb: 2048
    keep_containers: false

prompts:
  custom_file: ""

# ============================================================================
# Context Hub (chub) — Live API Documentation for Code Generation
# ============================================================================
# Fetches curated, versioned API docs from Andrew Ng's Context Hub before
# code generation, reducing API hallucinations. Annotates discovered gotchas
# during iterative repair so future runs start smarter.
#
# Install: npm install -g @aisuite/chub
# Docs:    https://github.com/andrewyng/context-hub
# ============================================================================
context_hub:
  enabled: false           # Set to true after installing chub CLI
  auto_fetch: true         # Auto-detect and fetch relevant API docs in Stage 10
  auto_annotate: true      # Auto-annotate API gotchas discovered in Stage 13
  max_docs: 5              # Max docs to fetch per code generation run
  max_chars: 12000         # Truncate total fetched docs to this many chars
  lang: "py"               # Default language variant (py, js, ts)
  timeout_sec: 30          # Timeout for each chub CLI invocation
